<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>
</head>
<body>
    <h1>👤 회원가입</h1>
    <p>SKALA-FRONT 회원가입을 환영합니다.</p>
    <hr>

    <form action="signUpResult.html" method="get">

        <fieldset>
            <legend>계정 정보</legend>
            <p>
                <label for="username">아이디:</label>
                <input type="text" id="username" name="username" placeholder="4~15자 영문/숫자" required> (필수)
            </p>
            <p>
                <label for="password">비밀번호:</label>
                <input type="password" id="password" name="password" placeholder="8자 이상 입력" required> (필수)
            </p>
            <p>
                <label for="email">이메일:</label>
                <input type="text" id="email" name="email" placeholder="example"> @
                <select name="emailDomain">
                    <option value="">직접 입력</option>
                    <option value="naver.com">naver.com</option>
                    <option value="gmail.com">gmail.com</option>
                    <option value="daum.net">daum.net</option>
                </select>
            </p>
        </fieldset>

        <br>

        <fieldset>
            <legend>개인 프로필 정보</legend>
            <p>
                <label for="name">이름:</label>
                <input type="text" id="name" name="name">
            </p>
            <p>
                <label for="birth">생년월일:</label>
                <input type="date" id="birth" name="birth">
            </p>
            <p>
                성별:
                <input type="radio" id="genderMale" name="gender" value="male">
                <label for="genderMale">남성</label>
                <input type="radio" id="genderFemale" name="gender" value="female">
                <label for="genderFemale">여성</label>
                <input type="radio" id="genderNone" name="gender" value="none">
                <label for="genderNone">선택안함</label>
            </p>
            <p>
                관심 분야 (중복 선택 가능):<br>
                <input type="checkbox" id="interestWeb" name="interest" value="web">
                <label for="interestWeb">웹 프론트엔드 (Vue.js/HTML)</label><br>
                <input type="checkbox" id="interestDesign" name="interest" value="design">
                <label for="interestDesign">UI/UX 디자인 표준</label><br>
                <input type="checkbox" id="interestBackend" name="interest" value="backend">
                <label for="interestBackend">백엔드 & 데이터베이스</label><br>
                <input type="checkbox" id="interestCloud" name="interest" value="cloud">
                <label for="interestCloud">클라우드 & 인프라</label>
            </p>
            <p>
                <label for="route">가입 경로:</label>
                <select id="route" name="route">
                    <option value="">-- 선택해 주세요 --</option>
                    <option value="search">인터넷 검색</option>
                    <option value="recommend">지인 추천</option>
                    <option value="sns">SNS 광고</option>
                    <option value="etc">기타</option>
                </select>
            </p>
        </fieldset>

        <br>

        <fieldset>
            <legend>자기소개</legend>
            <p>
                <label for="bio">나를 표현하는 한 줄 소개 또는 가입 인사:</label><br>
                <textarea id="bio" name="bio" cols="50" rows="5" placeholder="여기에 내용을 입력하세요 (최대 200자)"></textarea>
            </p>
        </fieldset>

        <br>

        <input type="submit" value="동의하고 회원가입">
        <input type="reset" value="다시 작성">

    </form>
</body>
</html>
